<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Register & Login </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="Registration.css">
</head>
<body>
    <div class="container" id="signUp" style="display: none;">
        <h1 class="form-title"> Register </h1>
        <form method="post" action="Backend.html">
            
            <!-- User Name -->
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="fName" id="fName" placeholder="Your First Name" required>
                <label for="fName"> First Name </label>
            </div>

            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="lName" id="lName" placeholder="Your Last Name" required>
                <label for="lName"> Last Name </label>
            </div>

            <!-- Email Address -->
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" id="email" placeholder="Your Email-id" required>
                <label for="email"> Email </label>
            </div>

            <!-- Password -->
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" id="password" placeholder="Password" required>
                <label for="password"> Password </label>
            </div> 

            <!-- Submit -->
            <input type="submit" class="btn" value="Sign Up" name="signUp">
                        
        </form>

        <p class="or">
            --------- OR ---------
        </p>

        <div class="icons">
            <i class="fab fa-google"></i>
            <i class="fab fa-facebook"></i>
        </div>

        <div class="links">
            <p> Already have an Account ? </p>
            <button id="signInButton"> Sign In </button>
        </div>

    </div>

    
    <!-- --------------------------------------- Sign-In Page --------------------------------------- -->
    
    <div class="container" id="signIn">
        <h1 class="form-title"> Sign In </h1>
        <form method="post" action="Backend.html">
            
            
            <!-- Email Address -->
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" id="email" placeholder="Your Email-id" required>
                <label for="email"> Email </label>
            </div>

            <!-- Password -->
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" id="password" placeholder="Password" required>
                <label for="password"> Password </label>
            </div> 

            <p class="recover">
                <a href="#"> Recover Password  </a>
            </p>

            <!-- Submit -->
            <input type="submit" class="btn" value="Sign In" name="signIn">
                        
        </form>

        <p class="or">
            --------- OR ---------
        </p>

        <div class="icons">
            <i class="fab fa-google"></i>
            <i class="fab fa-facebook"></i>
        </div>

        <div class="links">
            <p> Don't have account yet ? </p>
            <button id="signUpButton"> Sign Up </button>
        </div>

    </div>

    <script src="Registration.js"> </script>

</body>
</html>
